<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Snake Game - Kanthida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        canvas { border: 2px solid rgba(234, 179, 8, 0.3); background: #000; display: block; margin: auto; }
    </style>
</head>
<body class="bg-[#0a0a0c] text-white p-8">
    <nav class="max-w-[500px] mx-auto mb-6 flex justify-center gap-2">
        <a href="index.html" class="glass rounded-xl px-4 py-2 text-[10px]">🏠 หน้าหลัก</a>
    </nav>
    <div class="max-w-[400px] mx-auto text-center">
        <h1 class="text-2xl font-bold mb-4 text-yellow-400">Snake Arcade</h1>
        <canvas id="snakeGame" width="300" height="300"></canvas>
        <p class="mt-4 text-gray-400 text-sm">ใช้ปุ่มลูกศรในการบังคับ</p>
    </div>
    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        let box = 20; let snake = [{x: 9 * box, y: 10 * box}];
        let food = {x: Math.floor(Math.random()*15)*box, y: Math.floor(Math.random()*15)*box};
        let d; document.addEventListener("keydown", e => { if(e.keyCode==37 && d!="RIGHT") d="LEFT"; else if(e.keyCode==38 && d!="DOWN") d="UP"; else if(e.keyCode==39 && d!="LEFT") d="RIGHT"; else if(e.keyCode==40 && d!="UP") d="DOWN"; });
        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0,0,300,300);
            for(let i=0; i<snake.length; i++) { ctx.fillStyle = (i==0)?"#eab308":"white"; ctx.fillRect(snake[i].x, snake[i].y, box, box); }
            ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);
            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if(d=="LEFT") snakeX -= box; if(d=="UP") snakeY -= box; if(d=="RIGHT") snakeX += box; if(d=="DOWN") snakeY += box;
            if(snakeX==food.x && snakeY==food.y) food = {x: Math.floor(Math.random()*15)*box, y: Math.floor(Math.random()*15)*box};
            else snake.pop();
            let newHead = {x: snakeX, y: snakeY};
            if(snakeX<0 || snakeY<0 || snakeX>=300 || snakeY>=300) clearInterval(game);
            snake.unshift(newHead);
        }
        let game = setInterval(draw, 150);
    </script>
</body>
</html>
