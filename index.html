<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanthida OS - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        body { font-family: 'Noto Sans Thai', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <nav class="max-w-[500px] mx-auto mb-6 flex justify-end gap-2">
        <a href="personal_dashboard.html" class="glass rounded-xl px-4 py-2 text-[10px] text-blue-300 border border-blue-500/20">📂 หน้าสอง</a>
        <a href="game.html" class="glass rounded-xl px-4 py-2 text-[10px] text-green-300 border border-green-500/20">🎮 เล่นเกม</a>
    </nav>

    <main class="max-w-[500px] mx-auto space-y-6">
        <header class="flex justify-between items-start">
            <div>
                <h1 id="greeting" class="text-3xl font-semibold">สวัสดี</h1>
                <p id="current-date" class="text-blue-400/80 text-sm"></p>
            </div>
            <div id="clock" class="text-2xl font-mono">00:00</div>
        </header>

        <section class="grid grid-cols-3 gap-4">
            <a href="https://gemini.google.com" target="_blank" class="glass rounded-2xl p-4 flex flex-col items-center justify-center border-b-2 border-b-blue-500/50">✨ <span class="text-[10px] mt-1">Gemini</span></a>
            <a href="https://www.notion.so" target="_blank" class="glass rounded-2xl p-4 flex flex-col items-center justify-center">📓 <span class="text-[10px] mt-1">Notion</span></a>
            <a href="https://open.spotify.com" target="_blank" class="glass rounded-2xl p-4 flex flex-col items-center justify-center border-l-2 border-l-green-500/50">🎵 <span class="text-[10px] mt-1">Spotify</span></a>
        </section>

        <section class="glass rounded-3xl p-6">
            <h2 class="text-sm font-semibold mb-4">✅ สิ่งที่ต้องทำ</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="todo-input" placeholder="เพิ่มงาน..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none">
                <button onclick="addNewTodo()" class="bg-blue-600 px-4 py-2 rounded-xl text-sm">เพิ่ม</button>
            </div>
            <div id="todo-list" class="space-y-3"></div>
        </section>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('current-date').textContent = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        const storage = {
            save: (key, data) => localStorage.setItem('k_os_' + key, JSON.stringify(data)),
            get: (key, def) => JSON.parse(localStorage.getItem('k_os_' + key)) || def
        };

        let todoData = storage.get('todos', [{ text: 'ตัวอย่างงาน', checked: false }]);

        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todoData.forEach((todo, i) => {
                const div = document.createElement('div');
                div.className = `flex items-center gap-3 p-3 rounded-2xl bg-white/5 border border-white/5`;
                div.innerHTML = `
                    <div onclick="toggleTodo(${i})" class="w-5 h-5 rounded-full border-2 flex items-center justify-center cursor-pointer ${todo.checked ? 'bg-green-500 border-green-500' : 'border-slate-600'}">${todo.checked ? '✓' : ''}</div>
                    <span class="flex-1 text-sm ${todo.checked ? 'line-through text-slate-500' : ''}">${todo.text}</span>
                    <button onclick="removeTodo(${i})" class="text-[10px] text-red-400">ลบ</button>
                `;
                list.appendChild(div);
            });
            storage.save('todos', todoData);
        }
        window.addNewTodo = () => { const input = document.getElementById('todo-input'); if (input.value.trim()) { todoData.push({ text: input.value.trim(), checked: false }); input.value = ''; renderTodos(); } };
        window.toggleTodo = (i) => { todoData[i].checked = !todoData[i].checked; renderTodos(); };
        window.removeTodo = (i) => { todoData.splice(i, 1); renderTodos(); };
        renderTodos();
    </script>
</body>
</html>
